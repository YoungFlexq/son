<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vault</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="hd">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <span class="wordmark">VAULT</span>
        </div>
        <div class="hd-actions">
          <button id="btn-refresh" class="ghost" data-testid="refresh-all-btn" title="Refresh now" aria-label="Refresh">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" d="M13.5 3.5v3h-3M2.5 12.5v-3h3M3.4 6.5a5 5 0 0 1 9-1M12.6 9.5a5 5 0 0 1-9 1"/></svg>
          </button>
          <button id="btn-settings" class="ghost" data-testid="open-settings-btn" title="Settings" aria-label="Settings">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M2.5 4h11M2.5 8h11M2.5 12h11"/></svg>
          </button>
        </div>
      </header>

      <section id="add-bar">
        <input
          id="input-link"
          type="text"
          placeholder="Paste Roblox catalog link or asset ID"
          data-testid="add-item-link-input"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="add-row">
          <input
            id="input-target"
            type="number"
            min="1"
            placeholder="Target R$"
            data-testid="add-item-target-input"
          />
          <button id="btn-add" data-testid="add-item-submit-btn">Track</button>
        </div>
      </section>

      <div id="status-bar" class="status-bar" data-testid="status-bar"></div>

      <main id="list" class="list" data-testid="items-list">
        <div class="empty" id="empty-state" data-testid="empty-state">
          <div class="empty-mark" aria-hidden="true"></div>
          <div class="empty-title">No items tracked</div>
          <div class="empty-sub">Paste any Roblox limited link above to begin tracking.</div>
        </div>
      </main>

      <div id="settings-panel" class="panel hidden" data-testid="settings-panel">
        <div class="panel-head">
          <span>Settings</span>
          <button id="btn-close-settings" class="ghost" aria-label="Close" data-testid="close-settings-btn">×</button>
        </div>
        <div class="panel-row">
          <label>Auto-buy</label>
          <label class="switch">
            <input type="checkbox" id="set-autobuy" data-testid="settings-autobuy-toggle" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="panel-row">
          <label>Notifications</label>
          <label class="switch">
            <input type="checkbox" id="set-notif" data-testid="settings-notif-toggle" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="panel-row col">
          <label>Poll interval</label>
          <div class="seg" id="poll-seg" data-testid="settings-poll-segment">
            <button data-v="15">15s</button>
            <button data-v="30">30s</button>
            <button data-v="60">60s</button>
            <button data-v="120">2m</button>
          </div>
        </div>
        <div class="panel-row session" id="session-row" data-testid="session-row">
          <label>Roblox session</label>
          <span id="session-state" class="dim">checking…</span>
        </div>
        <div class="panel-row warn" id="autobuy-warn" data-testid="autobuy-warn">
          Auto-buy executes purchases instantly with your logged-in Roblox account. Use at your own risk.
        </div>
      </div>
    </div>

    <template id="row-template">
      <article class="row" data-testid="item-row">
        <div class="row-top">
          <div class="row-name-wrap">
            <div class="row-name" data-field="name">—</div>
            <span class="badge hidden" data-field="kind"></span>
          </div>
          <button class="ghost row-del" data-field="del" title="Remove" aria-label="Remove" data-testid="remove-item-btn">×</button>
        </div>
        <div class="row-grid">
          <div class="cell">
            <div class="k">RAP</div>
            <div class="v" data-field="rap">—</div>
          </div>
          <div class="cell">
            <div class="k">Value</div>
            <div class="v" data-field="value">—</div>
          </div>
          <div class="cell">
            <div class="k">Lowest</div>
            <div class="v" data-field="lowest">—</div>
          </div>
          <div class="cell">
            <div class="k">Demand</div>
            <div class="v" data-field="demand">—</div>
          </div>
          <div class="cell">
            <div class="k">Trend</div>
            <div class="v" data-field="trend">—</div>
          </div>
          <div class="cell">
            <div class="k">Target</div>
            <div class="v target-cell">
              <input type="number" class="target-input" data-field="target" data-testid="item-target-input" placeholder="—" />
            </div>
          </div>
        </div>
        <div class="risk-wrap">
          <div class="risk-head">
            <span class="k">Risk</span>
            <span class="risk-label" data-field="riskLabel">—</span>
          </div>
          <div class="risk-bar" data-testid="risk-bar">
            <div class="risk-marker" data-field="riskMarker"></div>
          </div>
          <div class="risk-reasons" data-field="riskReasons"></div>
        </div>
        <div class="row-foot">
          <span class="dim" data-field="ts">never</span>
          <a class="link" data-field="link" target="_blank" rel="noopener">View on Roblox →</a>
        </div>
      </article>
    </template>

    <script type="module" src="popup.js"></script>
  </body>
</html>
